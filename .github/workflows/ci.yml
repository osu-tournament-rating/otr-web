name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  lint-build:
    runs-on: ubuntu-latest
    env:
      # Dummy value needed so build-time imports that require DATABASE_URL do not throw.
      DATABASE_URL: postgresql://dummy:dummy@127.0.0.1:5432/dummy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Cache bun install store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-store-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-store-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache lint & type-check results
        uses: actions/cache@v4
        with:
          path: |
            tsconfig.tsbuildinfo
            apps/web/node_modules/.cache/eslint
            apps/data-worker/node_modules/.cache/eslint
          key: lint-tsc-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ github.sha }}
          restore-keys: |
            lint-tsc-${{ runner.os }}-${{ hashFiles('bun.lock') }}-
            lint-tsc-${{ runner.os }}-

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ hashFiles('apps/web/**/*.[jt]s', 'apps/web/**/*.[jt]sx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('bun.lock') }}-
            nextjs-${{ runner.os }}-

      - name: Run tests
        run: bun test

      - name: Run lint
        run: bun run lint

      - name: Type check
        run: bunx tsc --noEmit

      - name: Format check
        run: bunx prettier . --check

      - name: Build apps
        run: bun run build

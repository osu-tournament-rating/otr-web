name: Deploy

on:
  workflow_call:
    inputs:
      target:
        type: string
        description: 'GitHub environment to deploy to (e.g. staging or production)'
        required: true
      deploy_tag:
        type: string
        description: 'Docker image tag to deploy'
        required: true
      source_ref:
        type: string
        description: 'Git ref (branch, tag, or commit) to deploy'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: stagecodes/otr-web:${{ inputs.deploy_tag }}

      - name: Build and push data worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/data-worker/Dockerfile
          push: true
          tags: stagecodes/otr-data-worker:${{ inputs.deploy_tag }}

      - name: Create .env file from secret
        run: |
          printf '%s\n' "${{ secrets.ENV }}" > .env

      - name: Connect to tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ secrets.SSH_HOST }}

      - name: Ensure remote directory exists
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" bash <<'EOF'
            mkdir -p "$REMOTE_PATH"
          EOF

      - name: Create & upload deployment assets
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
          ENV_CONTENT: ${{ secrets.ENV }}
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          printf '%s\n' "$ENV_CONTENT" > .env

          case "$TARGET" in
            staging)
              SOURCE_COMPOSE="docker-compose-staging.yml"
              cp "$SOURCE_COMPOSE" docker-compose.yml
              ;;
            production)
              SOURCE_COMPOSE="docker-compose.yml"
              ;;
            *)
              echo "::error::Invalid environment: $TARGET"
              exit 1
              ;;
          esac

          echo "Source compose file: $SOURCE_COMPOSE"
          echo "Remote destination: $REMOTE_PATH/docker-compose.yml"
          scp -o StrictHostKeyChecking=no -r .env docker-compose.yml monitoring \
          "$SSH_USER@$SSH_HOST:$REMOTE_PATH/"

      - name: Deploy stack via docker compose
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" bash <<'EOF'
            export WEB_IMAGE="stagecodes/otr-web:${{ inputs.deploy_tag }}"
            export DATA_WORKER_IMAGE="stagecodes/otr-data-worker:${{ inputs.deploy_tag }}"
            cd "$REMOTE_PATH"
            docker compose --env-file .env pull
            docker compose --env-file .env --profile migrate run --rm migrate
            docker compose --env-file .env --profile node-exporter up -d
            docker compose --env-file .env up -d --remove-orphans
          EOF

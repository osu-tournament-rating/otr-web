name: Deploy

on:
  workflow_call:
    inputs:
      target:
        type: string
        description: 'GitHub environment to deploy to (e.g. Staging or Production)'
        required: true
      deploy_tag:
        type: string
        description: 'Docker image tag to deploy'
        required: true
      source_ref:
        type: string
        description: 'Git ref (branch, tag, or commit) to deploy'
        required: true
      skip_build:
        type: boolean
        description: 'Skip Docker image build and publish'
        required: false
        default: false

jobs:
  build:
    name: Build & push Docker images
    if: ${{ !inputs.skip_build }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          set -euo pipefail
          WEB_TAGS="stagecodes/otr-web:${{ inputs.deploy_tag }}"
          DW_TAGS="stagecodes/otr-data-worker:${{ inputs.deploy_tag }}"
          if [[ "${{ inputs.target }}" == "Production" ]]; then
            WEB_TAGS="${WEB_TAGS},stagecodes/otr-web:latest"
            DW_TAGS="${DW_TAGS},stagecodes/otr-data-worker:latest"
          fi
          echo "web=${WEB_TAGS}" >> "$GITHUB_OUTPUT"
          echo "data-worker=${DW_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.web }}

      - name: Build and push data worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/data-worker/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.data-worker }}

  ssh-setup:
    name: Copy assets & deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          sparse-checkout: |
            docker-compose.yml
            docker-compose-staging.yml
            monitoring

      - name: Connect to tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ secrets.SSH_HOST }}

      - name: Ensure remote directory exists
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" "mkdir -p \"$REMOTE_PATH\""

      - name: Create & upload deployment assets
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
          ENV_CONTENT: ${{ secrets.ENV }}
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          printf '%s\n' "$ENV_CONTENT" > .env

          case "$TARGET" in
            Staging)
              SOURCE_COMPOSE="docker-compose-staging.yml"
              echo "::notice::Uploading $SOURCE_COMPOSE as docker-compose.yml to $REMOTE_PATH (staging)"
              cp "$SOURCE_COMPOSE" docker-compose.yml
              ;;
            Production)
              SOURCE_COMPOSE="docker-compose.yml"
              echo "::notice::Uploading $SOURCE_COMPOSE to $REMOTE_PATH (production)"
              ;;
            *)
              echo "::error::Invalid environment: $TARGET"
              exit 1
              ;;
          esac

          echo "Source compose file: $SOURCE_COMPOSE"
          echo "Remote destination: $REMOTE_PATH/docker-compose.yml"
          scp -o StrictHostKeyChecking=no -r .env docker-compose.yml monitoring \
          "$SSH_USER@$SSH_HOST:$REMOTE_PATH/"

      - name: Deploy stack via docker compose
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" bash -s "$REMOTE_PATH" <<'EOF'
            set -euo pipefail
            REMOTE_PATH="$1"
            cd "$REMOTE_PATH"
            docker compose --env-file .env pull
            docker compose --env-file .env --profile migrate run --rm migrate
            docker compose --env-file .env --profile node-exporter up -d
            docker compose --env-file .env up -d --remove-orphans
          EOF
      
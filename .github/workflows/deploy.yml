name: Deploy

on:
  workflow_call:
    inputs:
      target:
        type: string
        description: 'GitHub environment to deploy to (e.g. Staging or Production)'
        required: true
      deploy_tag:
        type: string
        description: 'Docker image tag to deploy'
        required: true
      source_ref:
        type: string
        description: 'Git ref (branch, tag, or commit) to deploy'
        required: true
      skip_build:
        type: boolean
        description: 'Skip Docker image build and publish'
        required: false
        default: false

jobs:
  build:
    name: Build & push Docker images
    if: ${{ !inputs.skip_build }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: stagecodes/otr-web:${{ inputs.deploy_tag }}

      - name: Build and push data worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/data-worker/Dockerfile
          push: true
          tags: stagecodes/otr-data-worker:${{ inputs.deploy_tag }}

  ssh-setup:
    name: Copy deployment assets to remote host
    needs: build
    if: ${{ !cancelled() && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          sparse-checkout: |
            docker-compose.yml
            docker-compose-staging.yml
            monitoring

      - name: Connect to tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ secrets.SSH_HOST }}

      - name: Ensure remote directory exists
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          set -euo pipefail
          ssh "$SSH_USER@$SSH_HOST" "mkdir -p \"$REMOTE_PATH\""

      - name: Create & upload deployment assets
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
          ENV_CONTENT: ${{ secrets.ENV }}
        run: |
          set -euo pipefail
          printf '%s\n' "$ENV_CONTENT" > .env
          scp -r .env docker-compose.yml docker-compose-staging.yml monitoring \
          "$SSH_USER@$SSH_HOST:$REMOTE_PATH/"

  deploy:
    name: Deploy stack via docker compose
    needs: ssh-setup
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}

    steps:
      - name: Connect to tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ secrets.SSH_HOST }}

      - name: Deploy stack via docker compose
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
          DEPLOY_TAG: ${{ inputs.deploy_tag }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" bash -s "$DEPLOY_TAG" "$REMOTE_PATH" <<'EOF'
            set -euo pipefail
            DEPLOY_TAG="$1"
            REMOTE_PATH="$2"
            export WEB_IMAGE="stagecodes/otr-web:$DEPLOY_TAG"
            export DATA_WORKER_IMAGE="stagecodes/otr-data-worker:$DEPLOY_TAG"
            cd "$REMOTE_PATH"
            docker compose --env-file .env pull
            docker compose --env-file .env --profile migrate run --rm migrate
            docker compose --env-file .env --profile node-exporter up -d
            docker compose --env-file .env up -d --remove-orphans
          EOF

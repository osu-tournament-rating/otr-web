global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'postgres'
    static_configs:
      - targets: ['otr-staging-postgres-exporter:9187']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['otr-staging-rabbitmq:15692']

  - job_name: 'web'
    metrics_path: '/api/metrics'
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/metrics_token
    static_configs:
      - targets: ['otr-staging-web:3000']

  - job_name: 'data-worker'
    static_configs:
      - targets: ['otr-staging-data-worker:9091']

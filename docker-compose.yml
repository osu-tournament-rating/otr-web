services:
  db:
    image: postgres:17
    container_name: otr-db
    restart: unless-stopped
    shm_size: '256m'
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DOCKER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DOCKER_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DOCKER_POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DOCKER_POSTGRES_USER} -d ${DOCKER_POSTGRES_DB}',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  rabbitmq:
    image: rabbitmq:4-management
    container_name: otr-rabbitmq
    restart: unless-stopped
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ${DOCKER_RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${DOCKER_RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    command: >
      bash -c "rabbitmq-plugins enable --offline rabbitmq_prometheus && rabbitmq-server"
    healthcheck:
      test: ['CMD-SHELL', 'rabbitmq-diagnostics -q ping']
      interval: 10s
      timeout: 5s
      retries: 12

  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: stagecodes/otr-web:latest
    container_name: otr-migrate
    profiles:
      - migrate
    restart: 'no'
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL}
      RABBITMQ_AMQP_URL: ${DOCKER_RABBITMQ_AMQP_URL}
    command: ['./scripts/run-migrations.sh']

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: stagecodes/otr-web:latest
    container_name: otr-web
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-3000}:3000'
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL}
      RABBITMQ_AMQP_URL: ${DOCKER_RABBITMQ_AMQP_URL}
      METRICS_AUTH_TOKEN: ${METRICS_AUTH_TOKEN:-}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'bun -e "fetch(\"http://localhost:3000/api/health\").then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  data-worker:
    build:
      context: .
      dockerfile: apps/data-worker/Dockerfile
    image: stagecodes/otr-data-worker:latest
    container_name: otr-data-worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL}
      RABBITMQ_AMQP_URL: ${DOCKER_RABBITMQ_AMQP_URL}
      METRICS_PORT: '9091'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'bun -e "fetch(\"http://localhost:9091/health\").then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v3.13.1
    container_name: otr-prometheus
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /etc/prometheus/secrets
        echo -n "$${METRICS_AUTH_TOKEN}" > /etc/prometheus/secrets/metrics_token
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=30d \
          --web.enable-lifecycle
    environment:
      METRICS_AUTH_TOKEN: ${METRICS_AUTH_TOKEN:-}
    volumes:
      - prometheus-data:/prometheus
      - ./monitoring/prod/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prod/prometheus/rules:/etc/prometheus/rules:ro
    depends_on:
      - postgres-exporter

  loki:
    image: grafana/loki:3.7.3
    container_name: otr-loki
    restart: unless-stopped
    command:
      - '-config.file=/etc/loki/loki-config.yaml'
    volumes:
      - loki-data:/loki
      - ./monitoring/prod/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro

  alloy:
    image: grafana/alloy:v1.17.1
    container_name: otr-alloy
    restart: unless-stopped
    command:
      - run
      - '--storage.path=/var/lib/alloy/data'
      - /etc/alloy/config.alloy
    volumes:
      - ./monitoring/prod/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      loki:
        condition: service_started

  grafana:
    image: grafana/grafana:13.1.0
    container_name: otr-grafana
    restart: unless-stopped
    ports:
      - '${GRAFANA_PORT:-3001}:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-NULL}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/prod/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/prod/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.20.1
    container_name: otr-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_URI: db:5432/${DOCKER_POSTGRES_DB:-postgres}?sslmode=disable
      DATA_SOURCE_USER: ${DOCKER_POSTGRES_USER:-postgres}
      DATA_SOURCE_PASS: ${DOCKER_POSTGRES_PASSWORD:-password}
    depends_on:
      db:
        condition: service_healthy

  node-exporter:
    image: prom/node-exporter:v1.12.0
    container_name: otr-node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
    pid: host
    # Don't rename, will break disaster recovery
    profiles:
      - 'node-exporter'

volumes:
  postgres-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:
  alloy-data:
  loki-data:
